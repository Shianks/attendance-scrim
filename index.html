<!DOCTYPE html>
<html>
<head>

<title>4Synaris Scrim Attendance</title>

<style>

body{
background:#0b0f1a;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#00ffd5;
}

.container{
width:85%;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:#141a2e;
}

th,td{
border:1px solid #2e3552;
padding:10px;
}

th{
background:#1e2542;
}

input,select{
padding:6px;
background:#0e1324;
color:white;
border:1px solid #333;
}

button{
margin:5px;
padding:8px 15px;
background:#00ffd5;
border:none;
cursor:pointer;
font-weight:bold;
}

.deleteBtn{
background:#ff4d4d;
color:white;
}

</style>

</head>

<body>

<h1>4Synaris Scrimmage Attendance</h1>

<div class="container">

<p>Date: <input type="date" id="scrimDate"></p>

<table id="playerTable">

<tr>
<th>Player</th>
<th>Status</th>
<th>Remarks</th>
<th>Action</th>
</tr>

</table>

<button onclick="addPlayer()">Add Player</button>
<button onclick="submitAttendance()">Submit Attendance</button>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbzaVqa-YF4Ag7LkOWDymNDbxgANDdWot4yqTE1JIAtqwZ07mS1Jf4njQmu9vRSbiQaJ/exec";

function addPlayer(){

let table=document.getElementById("playerTable");

let row=table.insertRow();

row.innerHTML=`

<td><input placeholder="Player name"></td>

<td>
<select>
<option>Present</option>
<option>Absent</option>
</select>
</td>

<td>
<input placeholder="Remarks">
</td>

<td>
<button class="deleteBtn" onclick="deleteRow(this)">Delete</button>
</td>

`;

}

function deleteRow(btn){
btn.parentElement.parentElement.remove();
}

function submitAttendance(){

let date=document.getElementById("scrimDate").value;

let rows=document.querySelectorAll("#playerTable tr");

rows.forEach((row,i)=>{

if(i===0)return;

let player=row.cells[0].querySelector("input").value;
let status=row.cells[1].querySelector("select").value;
let remarks=row.cells[2].querySelector("input").value;

fetch(scriptURL,{
method:"POST",
body:JSON.stringify({
date:date,
player:player,
status:status,
remarks:remarks
})
});

});

alert("Attendance submitted!");

}

</script>

</body>
</html>
