<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrim Attendance Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        table { margin: 20px auto; border-collapse: collapse; width: 80%; max-width: 600px; }
        th, td { border: 1px solid #333; padding: 12px; }
        th { background: #1f1f1f; }
        input[type="text"] { padding: 8px; border-radius: 4px; border: none; }
        button { padding: 8px 15px; cursor: pointer; background: #00ce7c; border: none; color: white; font-weight: bold; border-radius: 4px; }
        .count { font-weight: bold; color: #00ce7c; }
    </style>
</head>
<body>

    ## 🎮 Scrim Attendance
    <p>Data is synced live for all players.</p>

    <div>
        <input type="text" id="playerName" placeholder="Enter Player Name">
        <button onclick="addPlayer()">Add Player</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Player Name</th>
                <th>Today's Attendance</th>
                <th>Total Scrims Played</th>
            </tr>
        </thead>
        <tbody id="playerTable">
            </tbody>
    </table>

    <script>
        // REPLACE THESE with your actual Supabase URL and Key
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchPlayers() {
            const { data, error } = await supabase.from('players').select('*');
            if (data) renderTable(data);
        }

        async function addPlayer() {
            const name = document.getElementById('playerName').value;
            if (!name) return;
            await supabase.from('players').insert([{ name: name, scrim_count: 0 }]);
            document.getElementById('playerName').value = '';
            fetchPlayers();
        }

        async function markAttended(id, currentCount) {
            await supabase.from('players').update({ scrim_count: currentCount + 1 }).eq('id', id);
            fetchPlayers();
        }

        function renderTable(players) {
            const tbody = document.getElementById('playerTable');
            tbody.innerHTML = '';
            players.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td>${p.name}</td>
                        <td><button onclick="markAttended(${p.id}, ${p.scrim_count})">✔️ Present</button></td>
                        <td class="count">${p.scrim_count}</td>
                    </tr>
                `;
            });
        }

        fetchPlayers();
    </script>
</body>
</html>
